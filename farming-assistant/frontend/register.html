<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmSaathi — Register</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/farmer-theme.css" />
  <link rel="stylesheet" href="css/visual-saas.css" />
  <link rel="stylesheet" href="css/design-system-3d.css" />
  <link rel="stylesheet" href="css/force-antigravity.css" />
</head>
<body class="auth-split">
  <button class="theme-toggle-fab" aria-label="Toggle Theme">🌙</button>

  <div class="page-container page-container--split">
    <div class="auth-illustration" aria-hidden="true">
      <img src="assets/logo.svg" width="80" height="80" alt="" />
      <h1>FarmSaathi</h1>
      <p class="tag-hi">नया खाता बनाएं</p>
    </div>
    <main class="auth-panel section glass-card" style="position:relative; z-index: 10;">
      <div class="brand-stack">
        <img src="assets/logo.svg" width="56" height="56" alt="" />
        <h2 data-i18n="register">Create an account ✨</h2>
      </div>
      <form id="register-form" class="auth-form">
        <input class="input-field" id="reg_full_name" required placeholder="Full Name" data-i18n-placeholder="full_name_ph" />
        <input class="input-field" id="reg_username" required minlength="3" placeholder="Username" data-i18n-placeholder="username_ph" />
        <div id="username-hint" class="hint"></div>
        <input class="input-field" id="reg_email" type="email" required placeholder="Email" data-i18n-placeholder="email_ph" />
        <input class="input-field" id="reg_phone" type="tel" placeholder="Phone (optional)" data-i18n-placeholder="phone_ph" />
        <input class="input-field" id="reg_password" type="password" required minlength="8" placeholder="Password" data-i18n-placeholder="password_ph" />
        <div id="pw-meter" class="pw-meter">weak</div>
        <input class="input-field" id="reg_password2" type="password" required placeholder="Confirm Password" data-i18n-placeholder="confirm_password_ph" />
        <div id="register-err" class="err" role="alert" hidden></div>
        <button type="submit" class="btn btn-primary btn--block">
          <span data-i18n="register_btn">Register</span>
        </button>
      </form>
      <p class="auth-footer"><a href="login.html" data-i18n="login">Login</a></p>
    </main>
  </div>
    <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      applyTranslations(document);
      initRegisterPage();
    });
  </script>
  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
