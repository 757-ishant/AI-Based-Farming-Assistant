<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FarmSaathi</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/farmer-theme.css" />
  <link rel="stylesheet" href="css/visual-saas.css" />
  <link rel="stylesheet" href="css/design-system-3d.css" />
  <link rel="stylesheet" href="css/force-antigravity.css" />
</head>
<body class="auth-panel-wrap">
  <button class="theme-toggle-fab" aria-label="Toggle Theme">🌙</button>

  <div class="page-container" style="max-width: 440px; margin: 0 auto; min-height: 100vh; display: flex; align-items: center">
    <main class="auth-panel section glass-card" style="width: 100%; padding: var(--space-4) var(--space-3); position:relative; z-index:10;">
      <h1 data-i18n="forgot_password">Forgot Password?</h1>
      <p data-i18n="forgot_password_help">कृपया सपोर्ट से संपर्क करें या नया खाता बनाएं।</p>
      <a class="btn btn-primary btn--block" href="login.html" style="margin-top: var(--space-2); text-decoration: none">
        <span>🔙</span><span data-i18n="back">Back</span>
      </a>
    </main>
  </div>
    <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
    <script>
    document.addEventListener("DOMContentLoaded", () => applyTranslations(document));
  </script>
  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
