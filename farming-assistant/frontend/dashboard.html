<body>

  <div class="page-container page-container--fluid">
    <div class="dash-layout">
      <aside class="dash-sidebar">
        <div class="sb-user" id="sb-user">👤 ...</div>
        <nav class="sb-nav" aria-label="sidebar">
          <a href="dashboard.html"><span>🏠</span><span data-i18n="bottom_home">Dashboard</span></a>
          <a href="disease.html"><span>📸</span><span data-i18n="disease_detect">Disease</span></a>
          <a href="weather.html"><span>🌦️</span><span data-i18n="weather">Weather</span></a>
          <a href="finance.html"><span>💰</span><span data-i18n="finance">Finance</span></a>
          <a href="mandi.html"><span>🛒</span><span data-i18n="mandi">Mandi</span></a>
          <a href="ndvi-map.html"><span>🗺️</span><span>NDVI Map</span></a>
          <a href="ai-advisor.html"><span>🤖</span><span>AI Advisor</span></a>
          <a href="community.html"><span>👥</span><span>Community</span></a>
          <a href="subsidies.html"><span>🏛️</span><span data-i18n="gov_schemes">Schemes</span></a>
          <a href="profile.html"><span>⚙️</span><span data-i18n="profile">Settings</span></a>
          <button type="button" class="btn btn--nav sb-linkbtn" id="btn-logout"><span>🚪</span><span
              data-i18n="logout">Logout</span></button>
        </nav>
      </aside>
      <div class="dash-main">
        <main class="dash-content">
          <section class="welcome-row card glass-card section">
            <div>
              <h1 id="dash-greet">-</h1>
              <p id="dash-loc">-</p>
              <p id="dash-crop">-</p>
            </div>
            <div id="weather-widget" class="weather-widget-host"></div>
          </section>
          <section class="quick-grid section">
            <a class="q-card glass-card" href="disease.html"><span class="qc-ico">📸</span><span
                data-i18n="disease_detect">Disease check</span></a>
            <a class="q-card glass-card" href="ndvi-map.html"><span class="qc-ico">🗺️</span><span>NDVI map</span></a>
            <a class="q-card glass-card" href="mandi.html"><span class="qc-ico">🛒</span><span
                data-i18n="mandi">Mandi</span></a>
            <a class="q-card glass-card" href="ai-advisor.html"><span class="qc-ico">🤖</span><span>AI
                advisor</span></a>
            <a class="q-card glass-card" href="finance.html"><span class="qc-ico">💰</span><span
                data-i18n="finance">Finance</span></a>
            <a class="q-card glass-card" href="community.html"><span class="qc-ico">👥</span><span>Community</span></a>
          </section>
          <section class="stats-row section">
            <div class="stat-pill glass-card" id="stat-soil">🌡️ Soil: -</div>
            <div class="stat-pill glass-card" id="stat-ndvi">🌿 NDVI: -</div>
            <div class="stat-pill glass-card" id="stat-pred">📊 Checks: -</div>
          </section>
          <section class="two-col section">
            <div class="glass-card">
              <h3 data-i18n="recent_activity">Recent checks</h3>
              <ul id="recent-preds" class="pred-list"></ul>
            </div>
            <div class="glass-card">
              <h3 data-i18n="alerts">Alerts</h3>
              <ul id="dash-alerts" class="alert-list"></ul>
            </div>
          </section>
        </main>
      </div>
    </div>
    <nav class="bottom-nav">
      <a href="dashboard.html" class="active"><span class="ni">🏠</span><span data-i18n="bottom_home"></span></a>
      <a href="disease.html"><span class="ni">📸</span><span data-i18n="bottom_disease"></span></a>
      <a href="weather.html"><span class="ni">🌦️</span><span data-i18n="bottom_weather"></span></a>
      <a href="finance.html"><span class="ni">💰</span><span data-i18n="bottom_finance"></span></a>
      <a href="profile.html"><span class="ni">👤</span><span data-i18n="bottom_profile"></span></a>
    </nav>
  </div>
  <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script src="js/voice-assistant.js"></script>
  <script src="js/chatbot-widget.js"></script>
  <script src="js/weather-widget.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      const RECENT_ACTIVITY_KEY = "farmsaathi_recent_activity";
      const soilEl = document.getElementById("stat-soil");
      const ndviEl = document.getElementById("stat-ndvi");
      const recentEl = document.getElementById("recent-preds");

      function setLoadingStates() {
        if (soilEl) soilEl.textContent = "🌡️ Soil: Loading...";
        if (ndviEl) ndviEl.textContent = "🌿 NDVI: Loading...";
        if (recentEl) recentEl.innerHTML = "<li>Loading...</li>";
      }

      function getStoredActivities() {
        try {
          const raw = localStorage.getItem(RECENT_ACTIVITY_KEY) || "[]";
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (e) {
          return [];
        }
      }

      function saveActivities(items) {
        localStorage.setItem(RECENT_ACTIVITY_KEY, JSON.stringify(items.slice(0, 10)));
      }

      function addRecentActivity(label) {
        if (!label) return;

        const items = getStoredActivities();
        const nextItems = [{ label, ts: Date.now() }, ...items].filter((item, index, arr) => {
          if (index === 0) return true;
          const previous = arr[index - 1];
          return !(previous && previous.label === item.label && Math.abs(previous.ts - item.ts) < 30000);
        });

        saveActivities(nextItems);
      }

      function renderRecentActivities() {
        if (!recentEl) return;

        const items = getStoredActivities().slice(0, 3);

        if (!items.length) {
          recentEl.innerHTML = "<li>No recent activity</li>";
          return;
        }

        recentEl.innerHTML = items.map((item) => "<li>" + item.label + "</li>").join("");
      }

      function registerDashboardActivityTracking() {
        const actionMap = {
          "mandi.html": "Checked mandi prices",
          "disease.html": "Scanned crop disease",
          "weather.html": "Viewed weather",
        };

        const referrer = (document.referrer || "").toLowerCase();

        Object.keys(actionMap).forEach((path) => {
          if (referrer.includes(path)) {
            addRecentActivity(actionMap[path]);
          }

          document.querySelectorAll('a[href="' + path + '"]').forEach((link) => {
            link.addEventListener("click", () => addRecentActivity(actionMap[path]));
          });
        });
      }

      function getNdviLabel(score) {
        if (score > 0.6) return "Healthy 🌱";
        if (score >= 0.3) return "Moderate ⚠️";
        return "Poor ⚠️";
      }

      async function loadEnvironmentalStats(profile) {
        const lat = profile && profile.lat != null ? profile.lat : null;
        const lng = profile && profile.lng != null ? profile.lng : null;

        if (lat == null || lng == null || lat === "" || lng === "") {
          if (soilEl) soilEl.textContent = "🌡️ Soil: Data unavailable";
          if (ndviEl) ndviEl.textContent = "🌿 NDVI: Data unavailable";
          return;
        }

        try {
          const ndviRes = await window.apiJson("/api/ndvi?lat=" + lat + "&lng=" + lng, { timeoutMs: 7000 });
          const ndviData = ndviRes.data || {};

          if (ndviRes.ok && ndviData.success && ndviData.ndvi_score != null) {
            const score = Number(ndviData.ndvi_score);
            const formattedScore = Number.isFinite(score) ? score.toFixed(2) : ndviData.ndvi_score;
            if (ndviEl) ndviEl.textContent = "🌿 NDVI: " + formattedScore + " (" + getNdviLabel(score) + ")";
          } else if (ndviEl) {
            ndviEl.textContent = "🌿 NDVI: Data unavailable";
          }
        } catch (e) {
          if (ndviEl) ndviEl.textContent = "🌿 NDVI: Data unavailable";
        }

        try {
          const soilRes = await window.apiJson("/api/soil?lat=" + lat + "&lng=" + lng, { timeoutMs: 7000 });
          const soilData = soilRes.data || {};
          const soilType = soilData.soil_type || soilData.soil || soilData.type;

          if (soilRes.ok && soilData.success && soilType) {
            if (soilEl) soilEl.textContent = "🌡️ Soil: " + soilType;
          } else if (soilEl) {
            soilEl.textContent = "🌡️ Soil: Data unavailable";
          }
        } catch (e) {
          if (soilEl) soilEl.textContent = "🌡️ Soil: Data unavailable";
        }
      }

      setLoadingStates();
      registerDashboardActivityTracking();
      renderRecentActivities();

      if (!(await guardRoutes())) return;
      applyTranslations(document);

      document.getElementById("btn-logout")?.addEventListener("click", async () => {
        try {
          await window.apiJson("/api/auth/logout", {
            method: "POST",
            headers: window.getAuthHeaders(),
            timeoutMs: 6500,
          });
        } catch (e) { }
        window.setAuthToken(null);
        localStorage.removeItem("profileComplete");
        window.showToast?.("success", typeof t === "function" ? t("logged_out") : "Logged out");
        window.location.href = "login.html";
      });

      try {
        const res = await window.apiJson("/api/farmer/dashboard", {
          headers: getAuthHeaders(),
          timeoutMs: 7000,
        });
        const d = res.data || {};
        if (!res.ok || !d.success) {
          window.showToast?.("error", d.error || res.error || (typeof t === "function" ? t("api_error") : "Error"));
          if (soilEl) soilEl.textContent = "🌡️ Soil: Data unavailable";
          if (ndviEl) ndviEl.textContent = "🌿 NDVI: Data unavailable";
          renderRecentActivities();
          return;
        }

        const u = JSON.parse(localStorage.getItem("farmerProfile") || "{}");
        const name = u.full_name || u.username || "";
        document.getElementById("dash-greet").innerHTML =
          (typeof t === "function" ? t("greeting_morning") : "Good morning,") +
          "<br><span style='font-weight:900; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent;'> " +
          name +
          "</span>";
        document.getElementById("dash-loc").textContent = (u.district || "") + (u.state ? ", " + u.state : "");
        document.getElementById("dash-crop").textContent =
          (u.main_crop || "") + (u.land_acres != null ? " • " + u.land_acres + " acres" : "");
        document.getElementById("sb-user").textContent = "👤 " + name;

        const preds = d.recent_predictions || [];
        document.getElementById("stat-pred").textContent = "📊 " + preds.length + " recent";
        renderRecentActivities();

        const alerts = d.pest_alerts || [];
        document.getElementById("dash-alerts").innerHTML = alerts
          .map((a) => "<li>⚠️ " + (a.title_hi || a.title) + "</li>")
          .join("");

        await loadEnvironmentalStats(u);
      } catch (e) {
        window.showToast?.("error", typeof t === "function" ? t("api_error") : "Error");
        if (soilEl) soilEl.textContent = "🌡️ Soil: Data unavailable";
        if (ndviEl) ndviEl.textContent = "🌿 NDVI: Data unavailable";
        renderRecentActivities();
      }

      loadWeatherWidget("weather-widget");
    });
  </script>
  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
