<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="lang_title">Language</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/farmer-theme.css" />
  <link rel="stylesheet" href="css/visual-saas.css" />
  <link rel="stylesheet" href="css/design-system-3d.css" />
  <link rel="stylesheet" href="css/force-antigravity.css" />
</head>
<body>
  <button class="theme-toggle-fab" aria-label="Toggle Theme">🌙</button>

  <div class="page-container">
    <main class="hero section glass-card" style="text-align: center; padding: var(--space-4) var(--space-3); margin-top: var(--space-2)">
      <h1 data-i18n="lang_title">Choose language</h1>
      <p data-i18n="lang_sub" style="font-size: 18px"></p>
    </main>
    <div class="lang-grid section" id="lang-grid"></div>
  </div>
    <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
    <script>
    const COLORS = ["#FFCDD2","#F8BBD9","#E1BEE7","#D1C4E9","#C5CAE9","#BBDEFB","#B3E5FC","#B2EBF2","#C8E6C9","#DCEDC8","#FFF9C4","#FFE0B2"];
    const LANGS = [
      { code: "hi", native: "हिंदी", region: "Hindi" },
      { code: "pa", native: "ਪੰਜਾਬੀ", region: "Punjabi" },
      { code: "mr", native: "मराठी", region: "Marathi" },
      { code: "te", native: "తెలుగు", region: "Telugu" },
      { code: "ta", native: "தமிழ்", region: "Tamil" },
      { code: "gu", native: "ગુજરાતી", region: "Gujarati" },
      { code: "bn", native: "বাংলা", region: "Bengali" },
      { code: "kn", native: "ಕನ್ನಡ", region: "Kannada" },
      { code: "ml", native: "മലയാളം", region: "Malayalam" },
      { code: "or", native: "ଓଡ଼ିଆ", region: "Odia" },
      { code: "as", native: "অসমীয়া", region: "Assamese" },
      { code: "en", native: "English", region: "English" },
    ];
    document.addEventListener("DOMContentLoaded", () => {
      applyTranslations(document);
      const grid = document.getElementById("lang-grid");
      LANGS.forEach((L, i) => {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "lang-card glass-card";
        b.style.background = COLORS[i % COLORS.length];
        b.innerHTML = "<span>" + L.native + "</span><span class=\"region\">" + L.region + "</span>";
        b.addEventListener("click", () => {
          localStorage.setItem("selectedLanguage", L.code);
          window.showToast?.("success", L.native);
          setTimeout(() => {
            window.location.href = "login.html";
          }, 400);
        });
        grid.appendChild(b);
      });
    });
  </script>
  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
