<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Advisor — FarmSaathi</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/farmer-theme.css" />
  <link rel="stylesheet" href="css/visual-saas.css" />
  <link rel="stylesheet" href="css/design-system-3d.css" />
  <link rel="stylesheet" href="css/force-antigravity.css" />
</head>
<body>
  <button class="theme-toggle-fab" aria-label="Toggle Theme">🌙</button>

  <header class="app-header" style="display: none"></header>
  <div class="page-container">
    <div class="page-title-bar section"><h1><span aria-hidden="true">🤖</span> AI Advisor</h1></div>
    <main class="page-main section">
      <section class="glass-card advisor-card section">
        <h2><span>🌱</span> Crop recommendation</h2>
        <button type="button" class="btn btn-primary btn--block" id="btn-reco" style="margin-top: var(--space-2)">
          <span>🔍</span><span>Get suggestions</span>
        </button>
        <div id="reco-out" style="margin-top: var(--space-2)"></div>
      </section>
      <section class="glass-card advisor-card section">
        <h2><span>📅</span> Crop calendar</h2>
        <button type="button" class="btn btn-primary btn--block" id="btn-cal" style="margin-top: var(--space-2)">
          <span>📆</span><span>Load calendar</span>
        </button>
        <div id="cal-out" style="margin-top: var(--space-2)"></div>
      </section>
      <section class="glass-card advisor-card section">
        <h2><span>⚠️</span> Pest alerts</h2>
        <button type="button" class="btn btn-primary btn--block" id="btn-pest" style="margin-top: var(--space-2)">
          <span>🔔</span><span>Load alerts</span>
        </button>
        <div id="pest-out" style="margin-top: var(--space-2)"></div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a href="dashboard.html"><span class="ni">🏠</span><span data-i18n="bottom_home"></span></a>
      <a href="ai-advisor.html" class="active"><span class="ni">🤖</span><span>AI</span></a>
      <a href="disease.html"><span class="ni">📸</span><span data-i18n="bottom_disease"></span></a>
      <a href="profile.html"><span class="ni">👤</span><span data-i18n="bottom_profile"></span></a>
    </nav>
  </div>
    <script src="js/theme.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
    <script src="js/voice-assistant.js"></script>
  <script src="js/ai-advisor.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      if (!(await guardRoutes())) return;
      applyTranslations(document);
      initAiAdvisorPage();
    });
  </script>
  <script src="js/translations.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
