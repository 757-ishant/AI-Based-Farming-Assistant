<!-- 
  CHATBOT WIDGET INTEGRATION SNIPPET
  Add these lines to ANY page to enable the chatbot widget
-->

<!-- In <head> section, add: -->
<link rel="stylesheet" href="css/chatbot-widget.css" />

<!-- Before </body> closing tag, add: -->
<script src="js/chatbot-widget.js"></script>

<!-- 
  That's it! The widget will automatically:
  - Show floating 💬 button (bottom-right)
  - Open chat popup on click
  - Support voice + text input
  - Maintain chat history
  - Work with existing language settings
  - Auto-initialize when user is logged in
  
  No additional configuration needed!
-->
